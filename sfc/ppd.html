<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>冲击瞬态计数器</title>
<style>
body{
	background:#111;
	color:#fff;
	font-family:Arial;
	text-align:center;
	padding:20px;
}
button{
	padding:12px 25px;
	font-size:18px;
	margin:10px;
}
#count{
	font-size:72px;
	margin:20px 0;
	color:#00ff99;
}
.panel{
	background:#1e1e1e;
	padding:15px;
	border-radius:10px;
	margin-top:20px;
}
.bar{
	height:18px;
	background:#333;
	border-radius:5px;
	overflow:hidden;
	margin:6px 0;
}
.fill{
	height:100%;
	width:0%;
	background:#00ff99;
}
.small{
	font-size:14px;
	color:#aaa;
}
</style>
</head>
<body>

<h2>冲击瞬态计数器</h2>
<button id="startBtn">开始监听</button>

<div id="count">0</div>

<div class="panel">
	<div>瞬时变化强度</div>
	<div class="bar"><div id="deltaBar" class="fill"></div></div>
	<div class="small">当前变化值: <span id="deltaText">0</span></div>
</div>

<div class="panel">
	<div>高频比例</div>
	<div class="bar"><div id="highBar" class="fill"></div></div>
	<div class="small">高频比例: <span id="highText">0</span></div>
</div>

<script>
"use strict";

let audioContext;
let analyser;
let mic;
let timeData;
let freqData;

let lastEnergy = 0;
let lastTriggerTime = 0;
let count = 0;

const MIN_INTERVAL = 200;

// 阈值（不用太大）
const DELTA_THRESHOLD = 0.02;
const HIGH_RATIO_THRESHOLD = 0.25;

const btn = document.getElementById("startBtn");
const countEl = document.getElementById("count");
const deltaBar = document.getElementById("deltaBar");
const deltaText = document.getElementById("deltaText");
const highBar = document.getElementById("highBar");
const highText = document.getElementById("highText");

btn.onclick = async function(){

	if(audioContext) return;

	try{
		const stream = await navigator.mediaDevices.getUserMedia({audio:true});

		audioContext = new (window.AudioContext || window.webkitAudioContext)();
		analyser = audioContext.createAnalyser();
		analyser.fftSize = 1024;

		mic = audioContext.createMediaStreamSource(stream);
		mic.connect(analyser);

		timeData = new Float32Array(analyser.fftSize);
		freqData = new Uint8Array(analyser.frequencyBinCount);

		loop();

	}catch(e){
		alert("麦克风获取失败");
	}
};

function loop(){

	analyser.getFloatTimeDomainData(timeData);

	let energy = 0;
	for(let i = 0; i < timeData.length; i++){
		energy += timeData[i] * timeData[i];
	}
	energy = Math.sqrt(energy / timeData.length);

	// 瞬时变化
	let delta = energy - lastEnergy;
	lastEnergy = energy;

	// 频域
	analyser.getByteFrequencyData(freqData);

	let highEnergy = 0;
	let totalEnergy = 0;

	let split = Math.floor(freqData.length * 0.7);

	for(let i = 0; i < freqData.length; i++){
		totalEnergy += freqData[i];
		if(i > split){
			highEnergy += freqData[i];
		}
	}

	let highRatio = totalEnergy ? highEnergy / totalEnergy : 0;

	// UI
	deltaBar.style.width = Math.min(delta * 4000, 100) + "%";
	deltaText.innerText = delta.toFixed(4);

	highBar.style.width = Math.min(highRatio * 200, 100) + "%";
	highText.innerText = highRatio.toFixed(3);

	let now = Date.now();

	// 放宽条件：只要瞬时变化够大即可
	if(
		delta > 0.01 &&  // 降低
		(now - lastTriggerTime > 180)
	){
		count++;
		lastTriggerTime = now;
		countEl.innerText = count;
	}

	requestAnimationFrame(loop);
}
</script>

</body>
</html>
