<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Piapa计数器 Pro</title>
<style>
body{
	background:#111;
	color:#fff;
	font-family:Arial;
	text-align:center;
	padding:20px;
}
button{
	padding:12px 25px;
	font-size:18px;
	margin:10px;
}
#count{
	font-size:72px;
	margin:20px 0;
	color:#00ff99;
}
.panel{
	background:#1e1e1e;
	padding:15px;
	border-radius:10px;
	margin-top:20px;
}
.bar{
	height:20px;
	background:#333;
	border-radius:5px;
	overflow:hidden;
	margin:5px 0;
}
.fill{
	height:100%;
	width:0%;
	background:#00ff99;
}
input[type=range]{
	width:100%;
}
.small{
	font-size:14px;
	color:#aaa;
}
</style>
</head>
<body>

<h2>Piapa 监听计数器</h2>
<button id="startBtn">开始监听</button>

<div id="count">0</div>

<div class="panel">
	<div>实时强度</div>
	<div class="bar"><div id="levelBar" class="fill"></div></div>
	<div class="small">当前强度: <span id="levelText">0</span></div>
</div>

<div class="panel">
	<div>阈值调节</div>
	<input type="range" id="thresholdSlider" min="0.01" max="0.5" step="0.01" value="0.08">
	<div class="small">当前阈值: <span id="thresholdText">0.08</span></div>
</div>

<script>
"use strict";

let audioContext;
let analyser;
let microphone;
let dataArray;

let count = 0;
let lastTriggerTime = 0;
let THRESHOLD = 0.08;
const MIN_INTERVAL = 180;

const countEl = document.getElementById("count");
const levelBar = document.getElementById("levelBar");
const levelText = document.getElementById("levelText");
const thresholdSlider = document.getElementById("thresholdSlider");
const thresholdText = document.getElementById("thresholdText");
const btn = document.getElementById("startBtn");

thresholdSlider.oninput = function(){
	THRESHOLD = parseFloat(this.value);
	thresholdText.innerText = THRESHOLD.toFixed(2);
};

btn.onclick = async function(){

	if(audioContext){
		return;
	}

	try{
		const stream = await navigator.mediaDevices.getUserMedia({audio:true});
		
		audioContext = new (window.AudioContext || window.webkitAudioContext)();
		analyser = audioContext.createAnalyser();
		analyser.fftSize = 2048;

		microphone = audioContext.createMediaStreamSource(stream);
		microphone.connect(analyser);

		dataArray = new Float32Array(analyser.fftSize);

		loop();

	}catch(e){
		alert("麦克风获取失败");
	}
};

function loop(){

	analyser.getFloatTimeDomainData(dataArray);

	let peak = 0;

	for(let i = 0; i < dataArray.length; i++){
		let v = Math.abs(dataArray[i]);
		if(v > peak) peak = v;
	}

	let now = Date.now();

	// 更新UI
	levelBar.style.width = Math.min(peak * 300, 100) + "%";
	levelText.innerText = peak.toFixed(3);

	if(peak > THRESHOLD && (now - lastTriggerTime > MIN_INTERVAL)){
		count++;
		lastTriggerTime = now;
		countEl.innerText = count;
	}

	requestAnimationFrame(loop);
}
</script>

</body>
</html>
