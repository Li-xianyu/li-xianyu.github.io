<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="theme-color" content="#f8f4ff">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title data-i18n="game.title">In Game...</title>
	<link rel="icon" href="img/favicon.png?v=20260308-1" sizes="any">
	<link rel="apple-touch-icon" href="img/favicon.png?v=20260308-1">
	<link rel="manifest" href="manifest.webmanifest">
	<meta name="application-name" content="Dual Protocol" data-i18n-content="common.appName">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="Dual Protocol" data-i18n-content="common.appName">
	<script>
		(() => {
			try {
				const raw = localStorage.getItem("GAME_UI_SETTINGS");
				if (!raw) return;
				const parsed = JSON.parse(raw);
				if (parsed && parsed.enableBoardIntroAnimation === false) {
					document.documentElement.setAttribute("data-board-intro-disabled", "1");
				}
			} catch (error) {}
		})();
	</script>
	<script>
		(() => {
			try {
				const params = new URLSearchParams(location.search);
				const boardToken = (params.get("id") || "").trim();
				const rawMode = (params.get("mode") || "").trim().toLowerCase();
				const mode = rawMode === "solo" ? "solo" : "dual";
				if (!boardToken) return;

				const store = JSON.parse(localStorage.getItem("SFC_GAME_SESSIONS_V1") || "null");
				if (!store || typeof store !== "object") return;

				const snapshot = store[`${boardToken}::${mode}`];
				if (!snapshot || typeof snapshot !== "object") return;
				if (String(snapshot.boardToken || "") !== boardToken) return;
				if (String(snapshot.mode || "") !== mode) return;

				document.documentElement.setAttribute("data-has-saved-game", "1");
			} catch (error) {}
		})();
	</script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="css/ui.css?v=20260331-1">
	<link rel="stylesheet" href="css/index.css?v=20260401-4">
	<script defer src="/js/umami-loader.js?v=20260328-1"></script>
</head>
<body class="game-page">

	<div class="board-intro-wash is-hidden" id="boardIntroWash" aria-hidden="true"></div>
	<div class="round-info" id="roundInfo" data-i18n="game.roundInitial">Round 1</div>
	<div class="board" id="board"></div>

	<div class="controls" id="controls">
		<button class="dice-btn master" id="rollmaster" type="button" data-i18n="game.roll.masterIdle">Z Roll</button>
		<button class="dice-btn passive" id="rolldice" type="button" data-i18n="game.roll.passiveIdle">B Roll</button>
	</div>

	<div class="task-panel" id="taskPanel">
		<div class="task-block" id="masterTaskBlock">
			<div class="task-title"><span data-i18n="game.taskMasterTitle">Z Task</span> <span class="task-badge" id="zVetoBadge" hidden data-i18n="game.vetoBadge">Veto</span></div>
			<div class="task-content" id="taskMaster" data-i18n="common.status.dash">—</div>
		</div>
		<div class="task-block">
			<div class="task-title">
				<span class="task-title-label" data-i18n="game.taskPassiveTitle">B Task</span>
				<span class="task-live-count" id="bTaskLiveCount" data-i18n="game.liveCountDefault">Total 0</span>
				<button class="task-detail-trigger" id="bTaskStatsBtn" type="button" data-i18n-aria-label="game.statsAria" data-i18n-title="game.statsTitle" aria-label="View B-task stats" title="View stats">
					<i class="bi bi-exclamation-lg" aria-hidden="true"></i>
				</button>
			</div>
			<div class="task-content" id="taskPassive" data-i18n="common.status.dash">—</div>
		</div>
	</div>

	<script src="lang/zh.js?v=20260401-5"></script>
	<script src="lang/en.js?v=20260401-5"></script>
	<script src="js/i18n.js?v=20260327-2"></script>
	<script src="js/ui.js?v=20260401-2"></script>
	<script src="js/pwa.js?v=20260331-1"></script>
	<script src="js/Data.js?v=20260401-2"></script>
	<script>
		// Game mode: dual / solo
		(() => {
			const sp = new URLSearchParams(location.search);
			const m = (sp.get('mode') || '').trim().toLowerCase();
			window.GAME_MODE = (m === 'solo' || m === 'dual') ? m : 'dual';
		})();
	</script>

	<script>
		(() => {
			const GAME_BOARD_DEBUG_STORAGE_KEY_NAME = "SFC_GAME_BOARD_DEBUG_ENABLED";
			const GAME_BOARD_DEBUG_SCRIPT_SRC = "js/game_board_debug.js?v=20260406-1";
			const GAME_INDEX_SCRIPT_SRC = "js/index.js?v=20260406-1";
			const ERUDA_SCRIPT_SRC = "https://cdn.jsdelivr.net/npm/eruda";

			function isGameBoardDebugEnabled() {
				try {
					const storedValue = localStorage.getItem(GAME_BOARD_DEBUG_STORAGE_KEY_NAME);
					if (storedValue === "1") return true;
					if (storedValue === "0") return false;
					return localStorage.getItem("debug") === "true";
				} catch (error) {
					return false;
				}
			}

			function loadScript(src) {
				return new Promise((resolve, reject) => {
					const existingScript = document.querySelector(`script[src="${src}"]`);
					if (existingScript) {
						resolve(existingScript);
						return;
					}

					const script = document.createElement("script");
					script.src = src;
					script.async = true;
					script.onload = () => resolve(script);
					script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
					document.body.appendChild(script);
				});
			}

			async function setupDebugToolsIfNeeded() {
				if (!isGameBoardDebugEnabled()) return;

				const erudaTask = loadScript(ERUDA_SCRIPT_SRC)
					.then(() => {
						if (window.eruda && !window.__SFC_ERUDA_INITIALIZED) {
							window.__SFC_ERUDA_INITIALIZED = true;
							window.eruda.init({
								tool: ["console", "elements", "network", "resources", "info"]
							});
							window.eruda.show("console");
							console.info("[GameDebug] Mobile debug console enabled.");
						}
					})
					.catch((error) => {
						console.warn("[GameDebug] Failed to load Eruda.", error);
					});

				const localDebugTask = loadScript(GAME_BOARD_DEBUG_SCRIPT_SRC).catch((error) => {
					console.warn("[GameDebug] Failed to load local debug helpers.", error);
				});

				await Promise.allSettled([erudaTask, localDebugTask]);
			}

			function getUrlParam(key) {
				const params = new URLSearchParams(window.location.search);
				return params.get(key);
			}

			function getValidBoardToken() {
				const token = (getUrlParam("id") || "").trim();

				if (!token) return "builtin:1";

				if (token.startsWith("builtin:") || token.startsWith("custom:")){
					return token;
				}

				/* Support legacy numeric links. */
				const n = parseInt(token, 10);
				if (!isNaN(n) && n > 0 && n <= Boards.length){
					return `builtin:${n}`;
				}

				return "builtin:1";
			}

			async function initGamePage() {
				try {
					await setupDebugToolsIfNeeded();
					await loadScript(GAME_INDEX_SCRIPT_SRC);
					if (typeof window.initGameSession === "function") {
						await window.initGameSession(getValidBoardToken());
					} else {
						renderBoard(getValidBoardToken());
					}
				} catch (error) {
					console.error("Failed to initialize game:", error);
					if (typeof window.showFatalGameMessage === "function") {
						window.showFatalGameMessage(error && (error.stack || error.message) ? (error.stack || error.message) : "Failed to initialize game.");
					}
					if (typeof renderBoard === "function") {
						renderBoard("builtin:1");
					}
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", initGamePage, { once: true });
			} else {
				initGamePage();
			}
		})();
	</script>
</body>
</html>
