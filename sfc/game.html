<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="theme-color" content="#f8f4ff">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title data-i18n="game.title">In Game...</title>
	<link rel="icon" href="img/favicon.png?v=20260308-1" sizes="any">
	<link rel="apple-touch-icon" href="img/favicon.png?v=20260308-1">
	<link rel="manifest" href="manifest.webmanifest">
	<meta name="application-name" content="Dual Protocol" data-i18n-content="common.appName">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="Dual Protocol" data-i18n-content="common.appName">
	<script>
		(() => {
			try {
				const raw = localStorage.getItem("GAME_UI_SETTINGS");
				if (!raw) return;
				const parsed = JSON.parse(raw);
				if (parsed && parsed.enableBoardIntroAnimation === false) {
					document.documentElement.setAttribute("data-board-intro-disabled", "1");
				}
			} catch (error) {}
		})();
	</script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="css/ui.css?v=20260331-1">
	<link rel="stylesheet" href="css/index.css?v=20260401-4">
	<script defer src="/js/umami-loader.js?v=20260328-1"></script>
</head>
<body class="game-page">

	<div class="board-intro-wash" id="boardIntroWash" aria-hidden="true"></div>
	<div class="round-info" id="roundInfo" data-i18n="game.roundInitial">Round 1</div>
	<div class="board" id="board"></div>

	<div class="controls" id="controls">
		<button class="dice-btn master" id="rollmaster" type="button" data-i18n="game.roll.masterIdle">Z Roll</button>
		<button class="dice-btn passive" id="rolldice" type="button" data-i18n="game.roll.passiveIdle">B Roll</button>
	</div>

	<div class="task-panel" id="taskPanel">
		<div class="task-block" id="masterTaskBlock">
			<div class="task-title"><span data-i18n="game.taskMasterTitle">Z Task</span> <span class="task-badge" id="zVetoBadge" hidden data-i18n="game.vetoBadge">Veto</span></div>
			<div class="task-content" id="taskMaster" data-i18n="common.status.dash">—</div>
		</div>
		<div class="task-block">
			<div class="task-title">
				<span class="task-title-label" data-i18n="game.taskPassiveTitle">B Task</span>
				<span class="task-live-count" id="bTaskLiveCount" data-i18n="game.liveCountDefault">Total 0</span>
				<button class="task-detail-trigger" id="bTaskStatsBtn" type="button" data-i18n-aria-label="game.statsAria" data-i18n-title="game.statsTitle" aria-label="View B-task stats" title="View stats">
					<i class="bi bi-exclamation-lg" aria-hidden="true"></i>
				</button>
			</div>
			<div class="task-content" id="taskPassive" data-i18n="common.status.dash">—</div>
		</div>
	</div>

	<script src="lang/zh.js?v=20260401-5"></script>
	<script src="lang/en.js?v=20260401-5"></script>
	<script src="js/i18n.js?v=20260327-2"></script>
	<script src="js/ui.js?v=20260401-2"></script>
	<script src="js/pwa.js?v=20260331-1"></script>
	<script src="js/Data.js?v=20260401-2"></script>
	<script src="js/game_board_debug.js?v=20260401-4"></script>
	<script>
		// Game mode: dual / solo
		(() => {
			const sp = new URLSearchParams(location.search);
			const m = (sp.get('mode') || '').trim().toLowerCase();
			window.GAME_MODE = (m === 'solo' || m === 'dual') ? m : 'dual';
		})();
	</script>
	<script src="js/index.js?v=20260401-6"></script>

	<script>
	function getUrlParam(key) {
		const params = new URLSearchParams(window.location.search);
		return params.get(key);
	}

	function getValidBoardToken() {
		const token = (getUrlParam("id") || "").trim();

		if (!token) return "builtin:1";

		if (token.startsWith("builtin:") || token.startsWith("custom:")){
			return token;
		}

		/* Support legacy numeric links. */
		const n = parseInt(token, 10);
		if (!isNaN(n) && n > 0 && n <= Boards.length){
			return `builtin:${n}`;
		}

		return "builtin:1";
	}

	function initGame() {
		try {
			const boardToken = getValidBoardToken();
			renderBoard(boardToken);
		} catch (error) {
			console.error('Failed to initialize game:', error);
			renderBoard('builtin:1');
		}
	}

	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', initGame);
	} else {
		initGame();
	}
</script>
</body>
</html>
