<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>游戏中...</title>
	<link rel="icon" href="img/favicon.png?v=20260308-1" sizes="any">
	<link rel="apple-touch-icon" href="img/favicon.png?v=20260308-1">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="css/ui.css?v=20260320-1">
	<link rel="stylesheet" href="css/index.css?v=20260320-1">
	<script defer src="https://cloud.umami.is/script.js" data-website-id="6ec19ab0-90c0-423c-86f5-f88666777765"></script>
</head>
<body class="game-page">

	<div class="round-info" id="roundInfo">第 1 回合</div>
	<div class="board" id="board"></div>

	<div class="controls" id="controls">
		<button class="dice-btn master" id="rollmaster" type="button">主投掷</button>
		<button class="dice-btn passive" id="rolldice" type="button">被投掷</button>
	</div>

	<div class="task-panel" id="taskPanel">
		<div class="task-block" id="masterTaskBlock">
			<div class="task-title">Z任务 <span class="task-badge" id="zVetoBadge" hidden>一票否决</span></div>
			<div class="task-content" id="taskMaster">—</div>
		</div>
		<div class="task-block">
			<div class="task-title">
				<span class="task-title-label">B任务</span>
				<span class="task-live-count" id="bTaskLiveCount">累计 0</span>
				<button class="task-detail-trigger" id="bTaskStatsBtn" type="button" aria-label="查看B任务统计" title="查看统计">
					<i class="bi bi-exclamation-lg" aria-hidden="true"></i>
				</button>
			</div>
			<div class="task-content" id="taskPassive">—</div>
		</div>
	</div>

	<script src="js/ui.js?v=20260320-1"></script>
	<script src="js/Data.js?v=20260308-1"></script>
	<script>
		// 游戏模式：dual（双人） / solo（单人）
		(() => {
			const sp = new URLSearchParams(location.search);
			const m = (sp.get('mode') || '').trim().toLowerCase();
			window.GAME_MODE = (m === 'solo' || m === 'dual') ? m : 'dual';
		})();
	</script>
	<script src="js/index.js?v=20260320-1"></script>

	<script>
	function getUrlParam(key) {
		const params = new URLSearchParams(window.location.search);
		return params.get(key);
	}

	function getValidBoardToken() {
		const token = (getUrlParam("id") || "").trim();

		if (!token) return "builtin:1";

		if (token.startsWith("builtin:") || token.startsWith("custom:")){
			return token;
		}

		/* 兼容旧版纯数字链接 */
		const n = parseInt(token, 10);
		if (!isNaN(n) && n > 0 && n <= Boards.length){
			return `builtin:${n}`;
		}

		return "builtin:1";
	}

	function initGame() {
		try {
			const boardToken = getValidBoardToken();
			renderBoard(boardToken);
		} catch (error) {
			console.error('初始化失败:', error);
			renderBoard('builtin:1');
		}
	}

	if (document.readyState === 'loading') {
		document.addEventListener('DOMContentLoaded', initGame);
	} else {
		initGame();
	}
</script>
</body>
</html>
