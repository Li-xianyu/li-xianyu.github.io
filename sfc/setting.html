<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>规则设置</title>
	<script src="js/Data.js?v=20260308-1"></script>
	<link rel="icon" href="img/favicon.png?v=20260308-1" sizes="any">
	<link rel="apple-touch-icon" href="img/favicon.png?v=20260308-1">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="css/ui.css?v=20260308-1">
	<link rel="stylesheet" href="css/setting.css?v=20260308-1">
	<script defer src="https://cloud.umami.is/script.js" data-website-id="6ec19ab0-90c0-423c-86f5-f88666777765"></script>
</head>
<body>
	<div class="page-wrap">

		<div class="top-bar">
			<button class="nav-btn nav-btn-left" id="backHomeBtn" type="button">
				<i class="bi bi-arrow-left"></i>
				返回主页
			</button>

			<h1 class="page-title">规则设置</h1>

			<button class="nav-btn nav-btn-right" id="goCreateBoardsBtn" type="button">
				<i class="bi bi-grid-3x3-gap-fill"></i>
				创建棋盘
			</button>
		</div>

		<!-- iOS 分段选择器 -->
		<div class="segmented" id="segmented">
			<button class="seg-btn active" type="button" data-tab="b">B：执行模块</button>
			<button class="seg-btn" type="button" data-tab="z">Z：指令模块</button>
			<div class="seg-indicator" id="segIndicator"></div>
		</div>

		<!-- ========== B：执行模块（GameData）========== -->
		<section class="tab-panel" id="panel-b">

			<fieldset>
				<legend>单次强度区间</legend>
				<div class="input-group">
					<div class="field">
						<label for="minCount">最小数量：</label>
						<input type="number" id="minCount" min="10" step="10">
					</div>

					<div class="field">
						<label for="maxCount">最大数量：</label>
						<input type="number" id="maxCount" min="20" step="10">
					</div>
				</div>
			</fieldset>

			<fieldset class="weight-settings-container">
				<legend>模块权重设置</legend>
				<p class="tip">权重表示各模块在随机生成时的相对占比。权重越高，被选中的概率越大。</p>

				<div class="input-container">
					<label for="weight-prop">核心模块权重：</label>
					<input type="number" id="weight-prop" value="80" min="0" max="100" step="1">
				</div>
				<div class="input-container">
					<label for="weight-reward">休息模块权重：</label>
					<input type="number" id="weight-reward" value="10" min="0" max="100" step="1">
				</div>
				<div class="input-container">
					<label for="weight-aod">位移模块权重：</label>
					<input type="number" id="weight-aod" value="5" min="0" max="100" step="1">
				</div>
				<div class="input-container">
					<label for="weight-sports">运动模块权重：</label>
					<input type="number" id="weight-sports" value="10" min="0" max="100" step="1">
				</div>
			</fieldset>

			<section class="module-card" aria-labelledby="modulePoolTitle">
				<div class="module-card-head">
					<h2 class="module-card-title" id="modulePoolTitle">执行内容池</h2>
					<p class="module-card-tip">点击选项即可切换启用/禁用（深色=启用，浅色=禁用）。带 <span class="plus-badge">+</span> 的分类支持自定义添加。</p>
				</div>
				<div id="settings-container"></div>
			</section>
		</section>

		<!-- ========== Z：指令模块（ActiveData）========== -->
		<section class="tab-panel" id="panel-z" style="display:none;">
			<fieldset class="weight-settings-container">
				<legend>Z 模块权重</legend>
				<p class="tip">这个权重是给未来“指令也参与随机池”预留的；现在不影响格子显示逻辑。</p>
				<div class="input-container">
					<label for="weight-active">指令权重：</label>
					<input type="number" id="weight-active" value="30" min="0" max="100" step="1">
				</div>
			</fieldset>

			<div id="active-container"></div>
		</section>

		<button class="save-btn" id="saveBtn">保存设置</button>

	</div>

	<div class="modal-overlay" id="modal">
		<div class="modal">
			<h2>设置已保存</h2>
			<p>你的配置已经成功保存。</p>
			<button onclick="closeModal()">确定</button>
		</div>
	</div>
<script src="js/ui.js?v=20260308-1"></script>
<script>
function track(eventName, payload){
	if (typeof window.trackEvent === "function"){
		window.trackEvent(eventName, payload);
	}
}

document.addEventListener("DOMContentLoaded", () => {
	initSegmented();

	loadSettingsB();
	loadGameDataB();
	loadActiveDataZ();

	renderSettingsB();
	renderSettingsZ();

	observeFieldsets();

	document.getElementById("saveBtn").addEventListener("click", saveAllSettings);

	const backHomeBtn = document.getElementById("backHomeBtn");
	if (backHomeBtn){
		backHomeBtn.addEventListener("click", () => {
			track("settings_back_home");
			window.location.href = "index.html";
		});
	}

	const goCreateBoardsBtn = document.getElementById("goCreateBoardsBtn");
	if (goCreateBoardsBtn){
		goCreateBoardsBtn.addEventListener("click", () => {
			track("settings_open_create_boards");
			window.location.href = "create_boards.html";
		});
	}
});

/* =========================
   Segmented Control
========================= */
function initSegmented(){
	const root = document.getElementById("segmented");
	const btns = root.querySelectorAll(".seg-btn");
	const indicator = document.getElementById("segIndicator");

	function moveIndicatorTo(btn){
		const r = btn.getBoundingClientRect();
		const pr = root.getBoundingClientRect();
		const left = r.left - pr.left;
		indicator.style.width = r.width + "px";
		indicator.style.transform = "translateX(" + left + "px)";
	}

	function switchTab(tabKey){
		const b = document.getElementById("panel-b");
		const z = document.getElementById("panel-z");

		if (tabKey === "b"){
			b.style.display = "";
			z.style.display = "none";
			resetPanelAnimations(b);
		}else{
			b.style.display = "none";
			z.style.display = "";
			resetPanelAnimations(z);
		}
		track("settings_tab_switched", { tab: tabKey });

		observeFieldsets();
	}

	btns.forEach(btn => {
		btn.addEventListener("click", () => {
			btns.forEach(x => x.classList.remove("active"));
			btn.classList.add("active");
			moveIndicatorTo(btn);
			switchTab(btn.dataset.tab);
		});
	});

	// 默认定位到 active 的按钮
	const act = root.querySelector(".seg-btn.active") || btns[0];
	requestAnimationFrame(() => moveIndicatorTo(act));

	// 旋转/缩放时也保持位置
	window.addEventListener("resize", () => {
		const act2 = root.querySelector(".seg-btn.active") || btns[0];
		moveIndicatorTo(act2);
	});
}

/* =========================
   B：执行模块
========================= */
function loadSettingsB() {
	const storedSettings = JSON.parse(
		localStorage.getItem(ACTION_COUNT_RANGE_STORAGE_KEY) ||
		localStorage.getItem(LEGACY_ACTION_COUNT_RANGE_STORAGE_KEY) ||
		"null"
	);
	if (storedSettings) {
		document.getElementById("minCount").value = storedSettings.min;
		document.getElementById("maxCount").value = storedSettings.max;
	} else {
		document.getElementById("minCount").value = ACTION_COUNT_RANGE.min;
		document.getElementById("maxCount").value = ACTION_COUNT_RANGE.max;
	}
}

function loadGameDataB() {
	const storedGameData = JSON.parse(localStorage.getItem("GameData"));
	GameData = normalizeGameData(storedGameData);
	fillWeightInputsFromGameData();
}

function fillWeightInputsFromGameData(){
	if (GameData.prop && GameData.prop.weight !== undefined) {
		document.getElementById("weight-prop").value = GameData.prop.weight;
	}
	if (GameData.reward && GameData.reward.weight !== undefined) {
		document.getElementById("weight-reward").value = GameData.reward.weight;
	}
	if (GameData.aod && GameData.aod.weight !== undefined) {
		document.getElementById("weight-aod").value = GameData.aod.weight;
	}
	if (GameData.sports && GameData.sports.weight !== undefined) {
		document.getElementById("weight-sports").value = GameData.sports.weight;
	}
}

const CATEGORY_LABELS = {
	posture: "姿势",
	prop: "工具",
	reward: "休息",
	aod: "位移",
	sports: "运动",
	active: "指令池（Z）"
};

const EDITABLE_SCOPE_META = {
	posture: { title: "新增姿势", placeholder: "输入新的姿势" },
	prop: { title: "新增工具", placeholder: "输入新的工具名称" },
	reward: { title: "新增休息", placeholder: "示例：休息3分钟（纯文本也可以）" },
	sports: { title: "新增运动", placeholder: "示例：平板支撑3分钟（纯文本也可以）" },
	active: { title: "新增 Z 指令", placeholder: "输入新的 Z 指令" }
};

function isEditableScope(scopeKey){
	return scopeKey === "active" || (
		Array.isArray(window.CUSTOMIZABLE_GAME_CATEGORIES) &&
		window.CUSTOMIZABLE_GAME_CATEGORIES.includes(scopeKey)
	);
}

function getScopeItems(scopeKey){
	if (scopeKey === "active") {
		if (!Array.isArray(ActiveData.items)) ActiveData.items = [];
		return ActiveData.items;
	}

	if (!GameData[scopeKey]) return [];
	if (!Array.isArray(GameData[scopeKey].items)) GameData[scopeKey].items = [];
	return GameData[scopeKey].items;
}

function normalizeCustomName(value){
	return String(value || "").replace(/\s+/g, " ").trim();
}

function persistScopeState(scopeKey){
	if (scopeKey === "active") {
		localStorage.setItem("ActiveData", JSON.stringify(ActiveData));
		return;
	}

	localStorage.setItem("GameData", JSON.stringify(GameData));
}

function splitItemsByOrigin(items){
	const official = [];
	const custom = [];

	(items || []).forEach(item => {
		if (item && item.custom) custom.push(item);
		else official.push(item);
	});

	return { official, custom };
}

function setChipDelay(btn, index){
	const d = Math.min(index, 18);
	btn.dataset.delay = String(d);
	if (index > 18) btn.dataset.dcap = "1";
}

function createSelectButton(scopeKey, item, index){
	const btn = document.createElement("button");
	btn.type = "button";
	btn.className = `select-btn ${item.selected ? "selected" : ""}`;
	btn.textContent = item.name;
	setChipDelay(btn, index);

	btn.addEventListener("click", () => {
		item.selected = !item.selected;
		btn.classList.toggle("selected", item.selected);
		persistScopeState(scopeKey);
	});

	return btn;
}

function createCustomChip(scopeKey, item, index){
	const wrap = document.createElement("div");
	wrap.className = "custom-chip-wrap";

	const btn = createSelectButton(scopeKey, item, index);
	btn.classList.add("custom-select-btn");

	const deleteBtn = document.createElement("button");
	deleteBtn.type = "button";
	deleteBtn.className = "custom-chip-delete";
	deleteBtn.textContent = "×";
	deleteBtn.setAttribute("aria-label", `删除 ${item.name}`);

	deleteBtn.addEventListener("click", async (event) => {
		event.preventDefault();
		event.stopPropagation();
		await removeCustomItem(scopeKey, item);
	});

	wrap.appendChild(btn);
	wrap.appendChild(deleteBtn);
	return wrap;
}

function createAddChip(scopeKey, index){
	const btn = document.createElement("button");
	btn.type = "button";
	btn.className = "select-btn add-select-btn";
	btn.textContent = "+";
	btn.setAttribute("aria-label", `新增 ${CATEGORY_LABELS[scopeKey] || "内容"}`);
	setChipDelay(btn, index);

	btn.addEventListener("click", async () => {
		await promptCreateCustomItem(scopeKey);
	});

	return btn;
}

function renderChipGroup(buttonGroup, scopeKey, items){
	const { official, custom } = splitItemsByOrigin(items);
	let visualIndex = 0;

	official.forEach(item => {
		buttonGroup.appendChild(createSelectButton(scopeKey, item, visualIndex));
		visualIndex += 1;
	});

	custom.forEach(item => {
		buttonGroup.appendChild(createCustomChip(scopeKey, item, visualIndex));
		visualIndex += 1;
	});

	if (isEditableScope(scopeKey)) {
		buttonGroup.appendChild(createAddChip(scopeKey, visualIndex));
	}
}

function rerenderScope(scopeKey){
	if (scopeKey === "active") renderSettingsZ();
	else renderSettingsB();

	requestAnimationFrame(() => observeFieldsets());
}

function hasDuplicateScopeItem(scopeKey, name){
	const normalizedName = normalizeCustomName(name).toLowerCase();
	return getScopeItems(scopeKey).some(item => normalizeCustomName(item.name).toLowerCase() === normalizedName);
}

function showInputDialog(options){
	const {
		title,
		placeholder,
		confirmText = "确定",
		cancelText = "取消",
		initialValue = ""
	} = options;

	return new Promise(resolve => {
		const overlay = document.createElement("div");
		overlay.className = "editor-overlay";

		const dialog = document.createElement("div");
		dialog.className = "editor-dialog";

		const heading = document.createElement("h3");
		heading.className = "editor-title";
		heading.textContent = title;

		const input = document.createElement("input");
		input.className = "editor-input";
		input.type = "text";
		input.maxLength = 60;
		input.placeholder = placeholder || "";
		input.value = initialValue;

		const actions = document.createElement("div");
		actions.className = "editor-actions";

		const cancelBtn = document.createElement("button");
		cancelBtn.type = "button";
		cancelBtn.className = "editor-btn editor-btn-secondary";
		cancelBtn.textContent = cancelText;

		const confirmBtn = document.createElement("button");
		confirmBtn.type = "button";
		confirmBtn.className = "editor-btn editor-btn-primary";
		confirmBtn.textContent = confirmText;

		const cleanup = (value) => {
			overlay.remove();
			resolve(value);
		};

		cancelBtn.addEventListener("click", () => cleanup(null));
		confirmBtn.addEventListener("click", () => cleanup(input.value));
		overlay.addEventListener("click", (event) => {
			if (event.target === overlay) cleanup(null);
		});

		input.addEventListener("keydown", (event) => {
			if (event.key === "Enter") {
				event.preventDefault();
				confirmBtn.click();
			}
			if (event.key === "Escape") {
				event.preventDefault();
				cancelBtn.click();
			}
		});

		actions.append(cancelBtn, confirmBtn);
		dialog.append(heading, input, actions);
		overlay.appendChild(dialog);
		document.body.appendChild(overlay);

		requestAnimationFrame(() => {
			input.focus();
			input.select();
		});
	});
}

function showConfirmDialog(options){
	const {
		title,
		message,
		confirmText = "确定",
		cancelText = "取消",
		danger = false
	} = options;

	return new Promise(resolve => {
		const overlay = document.createElement("div");
		overlay.className = "editor-overlay";

		const dialog = document.createElement("div");
		dialog.className = "editor-dialog editor-dialog-confirm";

		const heading = document.createElement("h3");
		heading.className = "editor-title";
		heading.textContent = title;

		const body = document.createElement("p");
		body.className = "editor-message";
		body.textContent = message;

		const actions = document.createElement("div");
		actions.className = "editor-actions";

		const cancelBtn = document.createElement("button");
		cancelBtn.type = "button";
		cancelBtn.className = "editor-btn editor-btn-secondary";
		cancelBtn.textContent = cancelText;

		const confirmBtn = document.createElement("button");
		confirmBtn.type = "button";
		confirmBtn.className = `editor-btn ${danger ? "editor-btn-danger" : "editor-btn-primary"}`;
		confirmBtn.textContent = confirmText;

		const cleanup = (value) => {
			overlay.remove();
			resolve(value);
		};

		cancelBtn.addEventListener("click", () => cleanup(false));
		confirmBtn.addEventListener("click", () => cleanup(true));
		overlay.addEventListener("click", (event) => {
			if (event.target === overlay) cleanup(false);
		});

		dialog.addEventListener("keydown", (event) => {
			if (event.key === "Escape") {
				event.preventDefault();
				cancelBtn.click();
			}
			if (event.key === "Enter") {
				event.preventDefault();
				confirmBtn.click();
			}
		});

		actions.append(cancelBtn, confirmBtn);
		dialog.append(heading, body, actions);
		overlay.appendChild(dialog);
		document.body.appendChild(overlay);

		requestAnimationFrame(() => {
			confirmBtn.focus();
		});
	});
}

async function promptCreateCustomItem(scopeKey){
	const meta = EDITABLE_SCOPE_META[scopeKey] || {
		title: "新增内容",
		placeholder: "输入新的内容"
	};

	const rawValue = await showInputDialog({
		title: meta.title,
		placeholder: meta.placeholder
	});

	if (rawValue === null) return;

	const name = normalizeCustomName(rawValue);
	if (!name) {
		showModal("内容不能为空", "请输入内容后再确定。");
		return;
	}

	if (hasDuplicateScopeItem(scopeKey, name)) {
		showModal("内容重复", "当前分类里已经有相同内容。");
		return;
	}

	getScopeItems(scopeKey).push(createCustomItem(scopeKey, name, true));
	persistScopeState(scopeKey);
	track("settings_custom_item_added", { scope: scopeKey });
	rerenderScope(scopeKey);
}

async function removeCustomItem(scopeKey, item){
	const shouldDelete = await showConfirmDialog({
		title: "删除自定义内容",
		message: `确定删除“${item.name}”吗？`,
		confirmText: "删除",
		cancelText: "取消",
		danger: true
	});

	if (!shouldDelete) return;

	const items = getScopeItems(scopeKey);
	const targetIndex = items.findIndex(entry => entry && entry.id === item.id);
	if (targetIndex === -1) return;

	items.splice(targetIndex, 1);
	persistScopeState(scopeKey);
	track("settings_custom_item_removed", { scope: scopeKey });
	rerenderScope(scopeKey);
}

function renderSettingsB() {
	const settingsContainer = document.getElementById("settings-container");
	settingsContainer.innerHTML = "";

	Object.keys(GameData).forEach(category => {
		const fieldset = document.createElement("fieldset");
		const legend = document.createElement("legend");
		legend.textContent = CATEGORY_LABELS[category] || category;
		fieldset.appendChild(legend);

		if (category === "sports") {
			const tip = document.createElement("p");
			tip.className = "tip";
			tip.textContent = "提示：支持中英文数字 + 秒/分钟单位（如“平板支撑3分钟”“拉伸20min”）会触发倒计时；纯文本也可正常使用。";
			fieldset.appendChild(tip);
		}

		if (category === "reward") {
			const tip = document.createElement("p");
			tip.className = "tip";
			tip.textContent = "提示：支持中英文数字 + 秒/分钟单位（如“休息3分钟”“休息45s”“休息20min”）会触发倒计时；纯文本也可正常使用。";
			fieldset.appendChild(tip);
		}

		if (category === "aod") {
			const tip = document.createElement("p");
			tip.className = "tip";
			tip.textContent = "提示：当前“前进1-3格/后退1-3格”仅执行位移，不触发落点格子的额外内容。";
			fieldset.appendChild(tip);
		}

		const buttonGroup = document.createElement("div");
		buttonGroup.className = "button-group";
		renderChipGroup(buttonGroup, category, GameData[category].items || []);

		fieldset.appendChild(buttonGroup);
		settingsContainer.appendChild(fieldset);
	});
}

/* =========================
   Z：指令模块（ActiveData）
========================= */
function loadActiveDataZ(){
	const storedActive = JSON.parse(localStorage.getItem("ActiveData"));
	ActiveData = normalizeActiveData(storedActive);
	document.getElementById("weight-active").value = (ActiveData.weight !== undefined ? ActiveData.weight : 30);
}

function renderSettingsZ(){
	const container = document.getElementById("active-container");
	container.innerHTML = "";

	const fieldset = document.createElement("fieldset");
	const legend = document.createElement("legend");
	legend.textContent = CATEGORY_LABELS.active;
	fieldset.appendChild(legend);

	const buttonGroup = document.createElement("div");
	buttonGroup.className = "button-group";
	renderChipGroup(buttonGroup, "active", ActiveData.items || []);

	fieldset.appendChild(buttonGroup);
	container.appendChild(fieldset);
}

/* =========================
   动效：Web Animations API
========================= */
let _fsObserver = null;

function animateFieldsetOnce(fs){
	if (fs.dataset.animated === "1") return;
	fs.dataset.animated = "1";

	fs.animate(
		[
			{ opacity: 0, transform: "translateY(10px)" },
			{ opacity: 1, transform: "translateY(0)" }
		],
		{
			duration: 420,
			easing: "cubic-bezier(.16,1,.3,1)",
			fill: "both"
		}
	);

	const btns = fs.querySelectorAll(".select-btn");
	btns.forEach(btn => {
		const cap = btn.dataset.dcap === "1";
		const d = cap ? 0 : (parseInt(btn.dataset.delay || "0", 10) * 18);

		btn.animate(
			[
				{ opacity: 0, transform: "translateY(6px)" },
				{ opacity: 1, transform: "translateY(0)" }
			],
			{
				duration: 320,
				delay: d,
				easing: "cubic-bezier(.16,1,.3,1)",
				fill: "both"
			}
		);
	});
}

function resetPanelAnimations(panel){
	const fss = panel.querySelectorAll("fieldset");
	fss.forEach(fs => {
		
		delete fs.dataset.animated;

		fs.getAnimations().forEach(a => a.cancel());

		fs.style.opacity = "0";
		fs.style.transform = "translateY(10px)";

		const btns = fs.querySelectorAll(".select-btn");
		btns.forEach(btn => {
			btn.getAnimations().forEach(a => a.cancel());
			btn.style.opacity = "0";
			btn.style.transform = "translateY(6px)";
		});
	});
}

function observeFieldsets(){
	if (_fsObserver) _fsObserver.disconnect();

	const bHidden = document.getElementById("panel-b").style.display === "none";
	const visiblePanel = bHidden ? document.getElementById("panel-z") : document.getElementById("panel-b");

	const allFieldsets = visiblePanel.querySelectorAll("fieldset");
	if (!allFieldsets.length) return;

	_fsObserver = new IntersectionObserver((entries) => {
		entries.forEach(entry => {
			if (!entry.isIntersecting) return;
			animateFieldsetOnce(entry.target);
			_fsObserver.unobserve(entry.target);
		});
	}, {
		threshold: 0,
		rootMargin: "160px 0px 160px 0px"
	});

	allFieldsets.forEach(fs => _fsObserver.observe(fs));

	requestAnimationFrame(() => {
		allFieldsets.forEach(fs => {
			const r = fs.getBoundingClientRect();
			if (r.bottom > -160 && r.top < (window.innerHeight + 160)) {
				animateFieldsetOnce(fs);
			}
		});
	});
}

function getNumericInputValue(id, fallbackValue){
	const input = document.getElementById(id);
	const value = Number.parseInt(input.value, 10);
	return Number.isFinite(value) ? value : fallbackValue;
}

/* =========================
   保存
========================= */
function saveAllSettings(){
	const minVal = getNumericInputValue("minCount", ACTION_COUNT_RANGE.min);
	const maxVal = getNumericInputValue("maxCount", ACTION_COUNT_RANGE.max);

	if (minVal % 10 !== 0 || maxVal % 10 !== 0) {
		showModal("错误", "请输入 10 的倍数！");
		return;
	}
	if (minVal >= maxVal) {
		showModal("错误", "最小值必须小于最大值！");
		return;
	}

	localStorage.setItem(ACTION_COUNT_RANGE_STORAGE_KEY, JSON.stringify({ min: minVal, max: maxVal }));
	localStorage.removeItem(LEGACY_ACTION_COUNT_RANGE_STORAGE_KEY);

	GameData.prop.weight = getNumericInputValue("weight-prop", GameData.prop.weight);
	GameData.reward.weight = getNumericInputValue("weight-reward", GameData.reward.weight);
	GameData.aod.weight = getNumericInputValue("weight-aod", GameData.aod.weight);
	GameData.sports.weight = getNumericInputValue("weight-sports", GameData.sports.weight);

	localStorage.setItem("GameData", JSON.stringify(GameData));

	ActiveData.weight = getNumericInputValue("weight-active", ActiveData.weight);
	localStorage.setItem("ActiveData", JSON.stringify(ActiveData));
	track("settings_saved", {
		min_count: minVal,
		max_count: maxVal,
		weight_prop: GameData.prop.weight,
		weight_reward: GameData.reward.weight,
		weight_aod: GameData.aod.weight,
		weight_sports: GameData.sports.weight,
		weight_active: ActiveData.weight
	});

	showModal("设置已保存", "你的配置已经成功保存。");
}

/* =========================
   Modal
========================= */
function showModal(title, message) {
	const modal = document.getElementById("modal");
	modal.querySelector("h2").textContent = title;
	modal.querySelector("p").textContent = message;
	modal.classList.add("show");
}
function closeModal() {
	document.getElementById("modal").classList.remove("show");
}
</script>
