<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="theme-color" content="#f8f4ff">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Dual Protocol</title>
	<link rel="icon" href="img/favicon.png?v=20260308-1" sizes="any">
	<link rel="apple-touch-icon" href="img/favicon.png?v=20260308-1">
	<link rel="manifest" href="manifest.webmanifest">
	<meta name="application-name" content="Dual Protocol">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="Dual Protocol">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intro.js@7.2.0/minified/introjs.min.css">

	<link rel="stylesheet" href="css/index.css?v=20260308-1">

</head>
<body class="home-page">
	<main class="menu-container">
		<section class="hero-panel">
			<div class="hero-chip-row" aria-hidden="true">
				<span class="hero-chip">Local-First</span>
				<span class="hero-chip">Dual & Solo</span>
			</div>

			<h1 class="game-title">Dual Protocol</h1>
			<p class="hero-subtitle">规则你定，骰子由命</p>

			<div class="install-spotlight" id="installSpotlight" hidden>
				<div class="install-spotlight-head">
					<span class="install-spotlight-badge">
						<i class="bi bi-phone-fill" aria-hidden="true"></i>
						App
					</span>
					<span class="install-spotlight-state" id="installSpotlightState">可安装</span>
				</div>
				<h2 class="install-spotlight-title">右上角菜单支持安装</h2>
				<p class="install-spotlight-desc" id="installSpotlightDesc">右上角固定悬浮菜单里有安装入口。装到桌面后，打开更快，也更像本地 App。</p>
				<div class="install-spotlight-actions">
					<button class="install-spotlight-btn install-spotlight-btn-primary" id="installSpotlightAction" type="button">立即安装</button>
					<button class="install-spotlight-btn install-spotlight-btn-secondary" id="installSpotlightGuide" type="button">浏览器建议</button>
				</div>
			</div>

			<div class="menu-buttons">
				<button class="menu-btn menu-btn-primary" id="startGame" type="button">
					<span class="menu-btn-icon" aria-hidden="true">🎮</span>
					<span class="menu-btn-copy">
						<span class="menu-btn-title">开始游戏</span>
						<span class="menu-btn-desc">掷下第一颗骰子，今天这局就开了</span>
					</span>
					<span class="menu-btn-arrow" aria-hidden="true">→</span>
				</button>

				<div class="menu-secondary-grid">
					<button class="menu-btn menu-btn-secondary" id="gameSettings" type="button">
						<span class="menu-btn-icon" aria-hidden="true">⚙️</span>
						<span class="menu-btn-copy">
							<span class="menu-btn-title">游戏设置</span>
							<span class="menu-btn-desc">调整项目权重与规则参数、自绘制棋盘路径</span>
						</span>
					</button>

					<button class="menu-btn menu-btn-secondary" id="gameManual" type="button">
						<span class="menu-btn-icon" aria-hidden="true">📖</span>
						<span class="menu-btn-copy">
							<span class="menu-btn-title">使用须知</span>
							<span class="menu-btn-desc">查看说明与隐私及使用条款</span>
						</span>
					</button>

					<button class="menu-btn menu-btn-secondary" id="devLog" type="button">
						<span class="menu-btn-icon" aria-hidden="true">📝</span>
						<span class="menu-btn-copy">
							<span class="menu-btn-title">开发日志</span>
							<span class="menu-btn-desc">看看我一路踩坑，顺便围观进化史</span>
						</span>
					</button>
				</div>
			</div>

			<div class="home-note">
				<span class="home-note-dot" aria-hidden="true"></span>
				<p>支持自定义棋盘与规则参数，开局前可自由调整。</p>
			</div>

			<div class="home-social">
				<a id="xProfileLink" class="home-social-link" href="https://x.com/yunshanlxy" target="_blank" rel="noopener noreferrer">
					<i class="bi bi-twitter-x" aria-hidden="true"></i>
					<span class="x-rant-copy">
						<span class="x-rant-name"><s>@yunshanlxy</s> <strong>（被资本做局）</strong></span>
						<span class="x-rant-line">X我去你大爷的，那么多黄片不封，封我一个做小工具的开发者。有本事来把我github也封了！！！啊啊啊</span>
					</span>
				</a>
			</div>
		</section>
	</main>

	<script src="js/ui.js?v=20260308-1"></script>
	<script src="js/pwa.js?v=20260327-1"></script>
	<script src="js/Data.js?v=20260308-1"></script>
	<script src="js/home.js?v=20260308-1"></script>
	<script src="https://cdn.jsdelivr.net/npm/intro.js@7.2.0/minified/intro.min.js"></script>
	<script src="js/home_onboarding_intro.js?v=20260308-1"></script>
</body>
</html>
