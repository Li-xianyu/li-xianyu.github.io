<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	
	<meta name="theme-color" content="#f8f4ff">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Dual Protocol</title>
	<link rel="icon" href="img/favicon.png" sizes="any">
	<link rel="apple-touch-icon" href="img/favicon.png">
	<meta name="theme-color" content="#6EA8FE">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="css/ui.css">
	<link rel="stylesheet" href="css/index.css">

<script>
/*
	UV统计
	- 只做轻量打点，不影响渲染
	- token + Origin 白名单（服务器端还会再校验）
*/
(function(){
	try{
		var ENDPOINT = 'https://1.xingkongw.top/pages_uvstatistics/log.php';
		var TOKEN = 'xianyu';
		var PAYLOAD = {
			path: location.pathname,
			page: (location.pathname.split('/').pop() || 'index.html'),
			ref: document.referrer || '',
			ts: Date.now()
		};

		var send = function(){
			fetch(ENDPOINT + '?token=' + encodeURIComponent(TOKEN) + '&t=' + Date.now(), {
				method: 'POST',
				headers: { 'Content-Type': 'application/json' },
				body: JSON.stringify(PAYLOAD),
				keepalive: true,
				credentials: 'omit',
				cache: 'no-store'
			}).catch(function(){});
		};

		if('requestIdleCallback' in window){
			requestIdleCallback(send, { timeout: 1500 });
		}else{
			setTimeout(send, 10);
		}
	}catch(e){}
})();
</script>
</head>
<body>
	<div class="menu-container">
		<h1 class="game-title">Dual Protocol</h1>
		<div class="menu-buttons">
			<button class="menu-btn" id="startGame">🎮 开始游戏</button>
			<button class="menu-btn" id="gameSettings">⚙️ 游戏设置</button>
			<button class="menu-btn" id="gameManual">📖 使用须知</button>
		</div>
	</div>

	<script src="js/ui.js"></script>
	<script src="js/Data.js"></script>
	<script src="js/home.js"></script>
</body>
</html>
